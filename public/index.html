<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4A90E2">
<title>Aura Tracker</title>
<link rel="manifest" href="/manifest.json">
<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" href="/favicon.png">
<!-- Apple Touch Icons -->
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png">
<link rel="apple-touch-icon" sizes="144x144" href="/icon-144x144.png">
<link rel="apple-touch-icon" sizes="120x120" href="/icon-120x120.png">
<link rel="apple-touch-icon" sizes="114x114" href="/icon-114x114.png">
<link rel="apple-touch-icon" sizes="76x76" href="/icon-76x76.png">
<link rel="apple-touch-icon" sizes="72x72" href="/icon-72x72.png">
<link rel="apple-touch-icon" sizes="60x60" href="/icon-60x60.png">
<link rel="apple-touch-icon" sizes="57x57" href="/icon-57x57.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  /* --- GLOBAL STYLES --- */
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
  html {
    background: linear-gradient(135deg, #87CEEB, #9B59B6, #4A90E2);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    background-attachment: fixed;
    background-color: #4A90E2;
    height: 100%;
    min-height: 100vh;
  }
  body { 
    background: linear-gradient(135deg, #87CEEB, #9B59B6, #4A90E2);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    background-attachment: fixed;
    min-height: 100vh;
    height: 100dvh; /* dynamic viewport height */
    overflow: hidden;
    margin: 0;
    padding: 0;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #4A90E2; /* added fallback background color */
  }
  
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* --- GLASS LOGIN --- */
  #loginContainer { backdrop-filter: blur(12px); background-color: rgba(255,255,255,0.1); padding:40px; border-radius:15px; display:flex; flex-direction:column; align-items:center; width:300px; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
  #loginContainer h1 { 
    color:white; 
    margin-bottom:20px; 
    text-shadow: 0 0 10px rgba(0,0,0,0.5);
    font-family: 'Bangers', 'Permanent Marker', 'Luckiest Guy', sans-serif;
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #FFD700, #FFA500, #FF8C00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
    animation: glow 2s ease-in-out infinite alternate;
  }
  #loginContainer input { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:none; outline:none; }
  #loginContainer button { padding:10px 20px; margin-top:15px; border:none; border-radius:8px; background: #00f6ff; color:#000; font-weight:bold; cursor:pointer; transition: 0.2s; }
  #loginContainer button:hover { background:#00c0cc; }

  /* --- DASHBOARD --- */
  #dashboard { 
    display:none; 
    flex-direction:column; 
    height:100vh; 
    width:100vw; 
    color:white;
    opacity: 0;
    transition: opacity 0.5s ease;
    overflow: hidden;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  
  /* Mobile-first responsive design */
  @media (max-width: 768px) {
    body {
      align-items: center;
      padding: 0;
    }
    
    #loginContainer {
      width: 90%;
      max-width: 350px;
      margin: 20px auto;
      padding: 30px 20px;
    }
    
    #topBar {
      padding: 10px 15px;
      flex-direction: column;
      gap: 10px;
      text-align: center;
    }
    
    #topBar h2 {
      font-size: 1.5rem;
      margin: 0;
    }
    
    #achievementsBtn {
      font-size: 0.9rem;
      padding: 6px 12px;
    }
    
    #cardsContainer {
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 20px 15px;
      max-width: 100%;
    }
    
    .userCard {
      height: 160px;
      padding: 15px;
    }
    
    .user-name {
      font-size: 1.4rem;
    }
    
    .aura-count {
      font-size: 1.8rem;
    }
    
    #slidePanel {
      width: 95%;
      max-width: 400px;
      height: 400px;
      bottom: -420px;
    }
    
    #bottomLeft {
      bottom: 15px;
      left: 15px;
      right: 15px;
      justify-content: center;
      gap: 15px;
    }
    
    #bottomLeft button {
      flex: 1;
      max-width: 150px;
    }
  }
  
  @media (max-width: 480px) {
    #cardsContainer {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 15px 10px;
      max-width: 100%;
    }
    
    .userCard {
      height: 140px;
      padding: 12px;
    }
    
    .user-name {
      font-size: 1.2rem;
    }
    
    .aura-count {
      font-size: 1.6rem;
    }
    
    #slidePanel {
      width: 100%;
      border-radius: 20px 20px 0 0;
    }
  }
  #topBar { display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.2); }
  #cardsContainer { 
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    padding:30px;
    justify-content: center;
    align-content: start;
    flex:1;
    overflow-y: auto;
    max-width: 800px;
    margin: 0 auto;
    min-height: 0;
  }
  
  .userCard { 
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 20px;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
    position: relative;
    height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
    min-height: 160px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  .userCard.has-background {
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.4);
  }
  
  .userCard::before {
    content: '';
    position: absolute;
    top: 1px;
    left: 1px;
    right: 1px;
    height: 4px;
    background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57);
    transform: scaleX(0);
    transform-origin: center;
    transition: transform 0.4s ease;
    border-radius: 11px 11px 0 0;
  }
  
  .userCard:hover::before {
    transform: scaleX(1);
  }
  
  .userCard:hover { 
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.5);
  }
  
  .userCard:active {
    transform: translateY(-2px) scale(1.01);
    transition: all 0.1s ease;
  }
  
  .user-avatar {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 5px;
  }
  .user-name {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  
  .user-aura {
    margin-bottom: 4px;
    text-shadow: none;
  }
  
  .user-gems {
    margin-bottom: 4px;
    text-shadow: none;
  }
  
  .aura-label {
    font-size: 1rem;
    font-weight: 600;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  
  .gems-label {
    font-size: 1rem;
    font-weight: 600;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  
  .aura-count {
    font-size: 2.2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #feca57, #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  
  .gems-count {
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, #00d4ff, #0099ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  
  .user-role {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 0.6rem;
    font-weight: 500;
    background: rgba(255,255,255,0.2);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .user-role.admin {
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    border-color: rgba(255, 107, 107, 0.5);
  }

  .user-name-tag {
    font-size: 0.9rem;
    font-weight: 600;
    color: #ffd700;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    margin-top: 4px;
    padding: 2px 8px;
    border-radius: 12px;
    background: rgba(255,215,0,0.2);
    border: 1px solid rgba(255,215,0,0.4);
    text-align: center;
  }

  .name-tag-card {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 15px;
    margin: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
    position: relative;
  }

  .name-tag-card:hover {
    background: rgba(255,255,255,0.2);
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  }

  .name-tag-card.equipped {
    background: rgba(255,215,0,0.2);
    border-color: gold;
    box-shadow: 0 0 20px rgba(255,215,0,0.3);
  }

  .name-tag-status {
    font-size: 24px;
    margin-bottom: 8px;
  }

  .name-tag-name {
    font-weight: bold;
    color: white;
    margin-bottom: 5px;
    font-size: 0.9rem;
  }

  .name-tag-description {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.7);
    margin-bottom: 10px;
  }

  .equip-btn {
    background: linear-gradient(135deg, #00f6ff, #00c0cc);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    color: #000;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 0.8rem;
  }

  .equip-btn:hover {
    background: linear-gradient(135deg, #00c0cc, #00a0aa);
    transform: scale(1.05);
  }

  .customization-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    border-bottom: 2px solid rgba(255,255,255,0.1);
  }

  .customization-tab-btn {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.7);
    padding: 10px 20px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
    border-bottom: 2px solid transparent;
  }

  .customization-tab-btn.active {
    color: #00f6ff;
    border-bottom-color: #00f6ff;
  }

  .customization-tab-btn:hover {
    color: #00f6ff;
  }

  .customization-tab-content {
    display: none;
  }

  .customization-tab-content.active {
    display: block;
  }

  #nameTagGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
    max-height: 400px;
    overflow-y: auto;
    padding: 10px;
  }

  .unequip-all-btn {
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 0.8rem;
  }

  .unequip-all-btn:hover {
    background: linear-gradient(135deg, #ee5a24, #c44569);
    transform: scale(1.05);
  }

  /* --- SLIDE PANEL --- */
  #slidePanel { 
    position:fixed; 
    bottom: -450px; 
    left: 50%; 
    transform: translateX(-50%); 
    width: 90%; 
    max-width: 350px;
    height: 400px;
    background: rgba(0,0,0,0.95); 
    backdrop-filter: blur(15px); 
    transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
    padding:20px; 
    overflow-y:auto; 
    border-radius: 20px 20px 0 0; 
    box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
    z-index: 1000;
  }
  #slidePanel.open { bottom: 0; }
  #slidePanel h2 { margin-bottom:15px; }
  .tabBtns { display:flex; gap:10px; margin-bottom:15px; }
  .tabBtns button { flex:1; padding:10px; border:none; border-radius:8px; cursor:pointer; background:#00f6ff; color:#000; font-weight:bold; transition:0.2s; }
  .tabBtns button.active { background:#00c0cc; }
  .tabContent { display:none; }
  .tabContent.active { display:block; }
  .actionBtn { width:100%; padding:10px; margin:5px 0; border:none; border-radius:8px; cursor:pointer; background:#00f6ff; color:#000; font-weight:bold; transition:0.2s; }
  .actionBtn:hover { background:#00c0cc; }

  /* --- CHART STYLING --- */
  #graphTab {
    padding: 10px;
    height: 250px;
  }

  #auraChart {
    width: 100% !important;
    height: 100% !important;
  }

  /* --- LOGOUT + SETTINGS --- */
  #bottomLeft { 
    position:fixed; 
    bottom:20px; 
    left:20px; 
    right:20px;
    display:flex; 
    gap:10px; 
    justify-content: center;
    flex-wrap: wrap;
  }
  #bottomLeft button { 
    padding:12px 20px; 
    border:none; 
    border-radius:8px; 
    cursor:pointer; 
    font-weight:bold; 
    background:#00f6ff; 
    color:#000; 
    transition:0.2s;
    min-height: 44px;
    min-width: 44px;
    touch-action: manipulation;
  }
  #bottomLeft button:hover { background:#00c0cc; }

  /* --- LOGIN ANIMATIONS --- */
  #loginContainer.shake {
    animation: shake 0.5s ease-in-out;
  }
  
  #loginContainer.success {
    animation: loginSuccess 0.5s ease-out forwards;
  }
  
  @keyframes loginSuccess {
    0% {
      transform: scale(1) rotate(0deg);
      opacity: 1;
    }
    50% {
      transform: scale(1.2) rotate(180deg);
      opacity: 0.8;
    }
    100% {
      transform: scale(0) rotate(360deg);
      opacity: 0;
    }
  }
  
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
    20%, 40%, 60%, 80% { transform: translateX(10px); }
  }
  
  .dumb-message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 0, 0, 0.9);
    color: white;
    padding: 20px 30px;
    border-radius: 15px;
    font-size: 24px;
    font-weight: bold;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  
  .dumb-message.show {
    opacity: 1;
  }

  /* --- LIVE NOTIFICATIONS --- */
  .live-notification {
    position: fixed;
    top: 80px;
    right: 20px;
    z-index: 3001;
    pointer-events: none;
    opacity: 0;
    transform: translateX(100%);
    transition: all 0.3s ease;
    max-width: 320px;
  }
  
  .live-notification.show {
    opacity: 1;
    transform: translateX(0);
  }
  
  .live-notification-content {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 15px 20px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 500;
  }
  
  .live-notification-icon {
    font-size: 20px;
    flex-shrink: 0;
  }
  
  .live-notification-message {
    flex: 1;
    line-height: 1.4;
  }

  /* --- MARKETPLACE STYLES --- */
  .marketplace-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    border-bottom: 2px solid rgba(255,255,255,0.1);
    padding-bottom: 10px;
  }

  .marketplace-tab-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px 8px 0 0;
    background: rgba(255,165,0,0.2);
    color: orange;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
    font-size: 16px;
  }

  .marketplace-tab-btn:hover {
    background: rgba(255,165,0,0.3);
  }

  .marketplace-tab-btn.active {
    background: rgba(255,165,0,0.4);
    border-bottom: 2px solid orange;
  }

  .marketplace-tab-content {
    display: none;
  }

  .marketplace-tab-content.active {
    display: block;
  }

  #marketplaceBackgroundsGrid, #backgroundsGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
    max-height: 400px;
    overflow-y: auto;
    padding: 10px;
  }

  #marketplaceNameColorsGrid, #nameColorsGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
    max-height: 400px;
    overflow-y: auto;
    padding: 10px;
  }

  .marketplace-item, .background-item {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(138,43,226,0.3);
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
  }

  .marketplace-item:hover, .background-item:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(138,43,226,0.3);
    border-color: rgba(138,43,226,0.6);
  }

  .marketplace-item.purchased {
    border-color: gold;
    background: rgba(255,215,0,0.1);
  }

  .marketplace-item.equipped {
    border-color: #00f6ff;
    background: rgba(0,246,255,0.1);
    box-shadow: 0 0 20px rgba(0,246,255,0.5);
  }

  .background-preview, .color-preview {
    width: 100%;
    height: 80px;
    border-radius: 8px;
    margin-bottom: 10px;
    border: 1px solid rgba(255,255,255,0.2);
  }

  .color-preview {
    margin-bottom: 5px;
  }

  /* Compact name color items */
  #marketplaceNameColorsGrid .marketplace-item,
  #nameColorsGrid .background-item {
    padding: 10px;
  }

  #marketplaceNameColorsGrid .color-preview,
  #nameColorsGrid .color-preview {
    height: 50px;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 10px rgba(0,0,0,0.5);
  }

  #marketplaceNameColorsGrid .item-name,
  #nameColorsGrid .item-name {
    font-size: 12px;
    margin-bottom: 3px;
  }

  #marketplaceNameColorsGrid .item-description,
  #nameColorsGrid .item-description {
    font-size: 10px;
    margin-bottom: 8px;
    opacity: 0.8;
  }

  #marketplaceNameColorsGrid .item-price,
  #nameColorsGrid .item-price {
    font-size: 14px;
    margin-bottom: 8px;
  }

  #marketplaceNameColorsGrid .buy-btn,
  #marketplaceNameColorsGrid .equip-btn,
  #nameColorsGrid .equip-btn {
    padding: 6px 12px;
    font-size: 12px;
  }

  .item-price {
    color: gold;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
  }

  .buy-btn, .equip-btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
    width: 100%;
  }

  .buy-btn {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }

  .buy-btn:hover {
    background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
    transform: scale(1.05);
  }

  .buy-btn:disabled {
    background: gray;
    cursor: not-allowed;
    transform: scale(1);
  }

  .equip-btn {
    background: linear-gradient(135deg, #00f6ff 0%, #00c0cc 100%);
    color: black;
  }

  .equip-btn:hover {
    background: linear-gradient(135deg, #00c0cc 0%, #00f6ff 100%);
    transform: scale(1.05);
  }

  .status-badge {
    position: absolute;
    top: 5px;
    right: 5px;
    background: gold;
    color: black;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: bold;
  }

<script>
/* ======= PRELOADED USERS ======= */
let users = [];
let currentUser = null;
let selectedUser = null;
let chart = null;
let failedAttempts = 0; // Track failed login attempts
let auraHistory = {}; // Store aura history for each user
let socket = null; // Socket.IO connection

// Initialize Socket.IO connection
function initializeSocket() {
  socket = io();
  
  socket.on('connect', () => {
    console.log('🔌 Connected to real-time server');
    
    // Authenticate with current user if logged in
    if (currentUser) {
      socket.emit('authenticate', currentUser.username);
    }
  });
  
  socket.on('disconnect', () => {
    console.log('🔌 Disconnected from real-time server');
  });
  
  socket.on('auraUpdate', (data) => {
    handleRealtimeUpdate(data);
  });
  
  socket.on('customizationUpdate', (data) => {
    handleCustomizationUpdate(data);
  });
}

// Handle real-time updates
function handleRealtimeUpdate(data) {
  console.log('🔄 Real-time update received:', data);
  
  // Show live notification
  showLiveNotification(data.message, data.type === 'give' ? 'success' : 'warning');
  
  // Update user data locally
  if (data.giver) {
    const giverIndex = users.findIndex(u => u.username === data.giver.username);
    if (giverIndex !== -1) {
      users[giverIndex].aura = data.giver.aura;
      users[giverIndex].totalGiven = data.giver.totalGiven;
      if (data.giver.gems !== undefined) users[giverIndex].gems = data.giver.gems;
      
      // Update gem count in marketplace if it's open and it's the current user
      if (data.giver.username === currentUser.username && marketplaceModal.style.display === 'block') {
        const gemCountElement = document.getElementById('userGemCount');
        if (gemCountElement) {
          gemCountElement.textContent = data.giver.gems || 0;
        }
      }
    }
  }
  
  if (data.receiver) {
    const receiverIndex = users.findIndex(u => u.username === data.receiver.username);
    if (receiverIndex !== -1) {
      users[receiverIndex].aura = data.receiver.aura;
      users[receiverIndex].totalReceived = data.receiver.totalReceived;
    }
  }
  
  if (data.target) {
    const targetIndex = users.findIndex(u => u.username === data.target.username);
    if (targetIndex !== -1) {
      users[targetIndex].aura = data.target.aura;
      users[targetIndex].totalReceived = data.target.totalReceived;
    }
  }
  
  if (data.remover) {
    const removerIndex = users.findIndex(u => u.username === data.remover.username);
    if (removerIndex !== -1) {
      users[removerIndex].aura = data.remover.aura;
      users[removerIndex].totalGiven = data.remover.totalGiven;
      if (data.remover.gems !== undefined) users[removerIndex].gems = data.remover.gems;
      
      // Update gem count in marketplace if it's open and it's the current user
      if (data.remover.username === currentUser.username && marketplaceModal.style.display === 'block') {
        const gemCountElement = document.getElementById('userGemCount');
        if (gemCountElement) {
          gemCountElement.textContent = data.remover.gems || 0;
        }
      }
    }
  }
  
  // Re-render cards to show updated values
  renderCards();
  
  // Update slide panel if it's open for the affected user
  if (selectedUser && 
      ((data.receiver && data.receiver.username === selectedUser.username) ||
       (data.target && data.target.username === selectedUser.username))) {
    openSlidePanel();
  }
  
  // Note: Achievement notifications are now handled separately via achievementUnlock event
}

// Handle customization updates
function handleCustomizationUpdate(data) {
  console.log('🎨 Customization update received:', data);
  
  // Show live notification
  showLiveNotification(data.message, 'success');
  
  // Update user data locally
  if (data.user) {
    const userIndex = users.findIndex(u => u.username === data.user.username);
    if (userIndex !== -1) {
      // Update customization fields
      if (data.user.equippedNameColor !== undefined) {
        users[userIndex].equippedNameColor = data.user.equippedNameColor;
      }
      if (data.user.equippedBackground !== undefined) {
        users[userIndex].equippedBackground = data.user.equippedBackground;
      }
      if (data.user.equippedNameTag !== undefined) {
        users[userIndex].equippedNameTag = data.user.equippedNameTag;
      }
      if (data.user.aura !== undefined) {
        users[userIndex].aura = data.user.aura;
      }
    }
  }
  
  // Re-render cards to show updated customization
  renderCards();
  
  // Apply dashboard background if current user updated their background
  if (data.customizationType === 'background' && data.user && data.user.username === currentUser.username) {
    applyDashboardBackground();
  }
  
  // Refresh customization modal if open and it's the current user
  if (cardCustomizationModal.style.display === 'block' && data.user && data.user.username === currentUser.username) {
    renderNameTags();
    renderBackgrounds();
    renderNameColors();
  }
}

// Show live notification (different from regular notifications)
function showLiveNotification(message, type = 'info') {
  const notification = document.createElement('div');
  notification.className = `live-notification ${type}`;
  notification.innerHTML = `
    <div class="live-notification-content">
      <span class="live-notification-icon">${type === 'success' ? '🎉' : '⚠️'}</span>
      <span class="live-notification-message">${message}</span>
    </div>
  `;
  
  // Add to page
  document.body.appendChild(notification);
  
  // Show with animation
  setTimeout(() => {
    notification.classList.add('show');
  }, 100);
  
  // Auto-hide after 4 seconds
  setTimeout(() => {
    notification.classList.remove('show');
    setTimeout(() => {
      if (document.body.contains(notification)) {
        document.body.removeChild(notification);
      }
    }, 300);
  }, 4000);
}

// Server communication functions
async function loadFromServer() {
  try {
    const res = await fetch('/api/users');
    const data = await res.json();
    users.length = 0;
    users.push(...data.users);
  } catch (error) {
    console.error('Error loading users:', error);
    showNotification('❌ Failed to load users from server', 'error');
  }
}

async function saveToServer() {
  try {
    await fetch('/api/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ users })
    });
  } catch (error) {
    console.error('Error saving users:', error);
    showNotification('❌ Failed to save users to server', 'error');
  }
}

// Announcement functions
async function loadAnnouncement() {
  try {
    const res = await fetch('/api/announcement');
    const data = await res.json();
    return data.announcement || '';
  } catch (error) {
    console.error('Error loading announcement:', error);
    return '';
  }
}

async function updateAnnouncement(text) {
  try {
    const res = await fetch('/api/announcement', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ announcement: text })
    });
    
    if (res.ok) {
      showNotification('✅ Announcement updated successfully!', 'success');
      return true;
    } else {
      showNotification('❌ Failed to update announcement', 'error');
      return false;
    }
  } catch (error) {
    console.error('Error updating announcement:', error);
    showNotification('❌ Failed to update announcement', 'error');
    return false;
  }
}

// Initialize aura history for users
function initializeAuraHistory() {
  users.forEach(user => {
    if (!auraHistory[user.username]) {
      auraHistory[user.username] = [
        {
          time: new Date().toLocaleTimeString(),
          timestamp: Date.now(),
          aura: user.aura
        }
      ];
    } else {
      // Add current aura as latest entry if history exists but is old
      const lastEntry = auraHistory[user.username][auraHistory[user.username].length - 1];
      const twelveHoursAgo = Date.now() - (12 * 60 * 60 * 1000);
      
      if (lastEntry.timestamp < twelveHoursAgo) {
        addAuraHistoryEntry(user.username, user.aura);
      }
    }
  });
}

// Add aura change to history
function addAuraHistoryEntry(username, newAura) {
  if (!auraHistory[username]) {
    auraHistory[username] = [];
  }
  
  const entry = {
    time: new Date().toLocaleTimeString(),
    timestamp: Date.now(),
    aura: newAura
  };
  
  auraHistory[username].push(entry);
  
  // Keep entries from the last 24 hours only
  const twentyFourHoursAgo = Date.now() - (24 * 60 * 60 * 1000);
  auraHistory[username] = auraHistory[username].filter(entry => entry.timestamp > twentyFourHoursAgo);
}

function getTodayString() {
  return new Date().toDateString();
}

function checkAndResetDailyLimits() {
  const today = getTodayString();
  const lastReset = localStorage.getItem('lastAuraReset');
  
  if (lastReset !== today) {
    // Reset all net daily aura to 0
    users.forEach(user => {
      if (user.netDailyAura) {
        Object.keys(user.netDailyAura).forEach(giver => {
          user.netDailyAura[giver] = 0;
        });
      }
    });
    localStorage.setItem('lastAuraReset', today);
  }
}

// Initialize daily tracking when dashboard loads
function initializeDailyTracking() {
  checkAndResetDailyLimits();
  
  users.forEach(user => {
    if (!user.netDailyAura) {
      user.netDailyAura = {};
    }
  });
}

/* ======= LOGIN LOGIC ======= */
const loginContainer = document.getElementById("loginContainer");
const dashboard = document.getElementById("dashboard");
const loginBtn = document.getElementById("loginBtn");
const usernameInput = document.getElementById("usernameInput");
const passwordInput = document.getElementById("passwordInput");

loginBtn.addEventListener("click", () => {
  const username = usernameInput.value.trim().charAt(0).toUpperCase() + usernameInput.value.trim().slice(1);
  const password = passwordInput.value.trim();
  const user = users.find(u => u.username.toLowerCase() === username.toLowerCase() && u.password === password);
  if(user){
    currentUser = user;
    localStorage.setItem("currentUser", username);
    
    // Add dramatic success animation
    loginContainer.classList.add('success');
    
    // Show dashboard after animation
    setTimeout(() => {
      showDashboard();
    }, 2000);
    
    failedAttempts = 0; // Reset failed attempts on successful login
  } else {
    failedAttempts++; // Increment failed attempts
    
    // Add shake animation
    loginContainer.classList.add('shake');
    
    // Create and show appropriate message
    const dumbMessage = document.createElement('div');
    dumbMessage.className = 'dumb-message';
    
    if (failedAttempts === 1) {
      dumbMessage.textContent = "YOU'RE THAT DUMB 🤪";
    } else if (failedAttempts === 2) {
      dumbMessage.textContent = "THERES NO WAYY 🤪";
    } else if (failedAttempts >= 3) {
      dumbMessage.textContent = "Bro. just stop 🤪";
    }
    
    document.body.appendChild(dumbMessage);
    
    // Show message
    setTimeout(() => {
      dumbMessage.classList.add('show');
    }, 100);
    
    // Hide login form
    setTimeout(() => {
      loginContainer.style.opacity = '0';
      loginContainer.style.transform = 'scale(0.8)';
    }, 200);
    
    // Remove shake and show login form again
    setTimeout(() => {
      loginContainer.classList.remove('shake');
      loginContainer.style.opacity = '1';
      loginContainer.style.transform = 'scale(1)';
      dumbMessage.classList.remove('show');
    }, 1500);
    
    // Remove message completely
    setTimeout(() => {
      document.body.removeChild(dumbMessage);
    }, 2000);
    
    // Clear inputs
    usernameInput.value = '';
    passwordInput.value = '';
  }
});

/* Persistent login */
window.addEventListener("load", async () => {
  // Load users from server first
  await loadFromServer();
  
  // Load and display announcement
  const announcement = await loadAnnouncement();
  const announcementBox = document.getElementById('announcementBox');
  if (announcementBox) {
    announcementBox.textContent = announcement;
  }
  
  const savedUser = localStorage.getItem("currentUser");
  if(savedUser){
    const user = users.find(u=>u.username.toLowerCase()===savedUser.toLowerCase());
    if(user){ 
      currentUser=user; 
      showDashboard(); 
    }
  }
});

/* ======= DASHBOARD LOGIC ======= */
function applyDashboardBackground() {
  if (!currentUser || !currentUser.equippedBackground) {
    // Reset to default background if no background equipped
    document.body.style.background = 'linear-gradient(135deg, #87CEEB, #9B59B6, #4A90E2)';
    document.body.style.backgroundSize = '400% 400%';
    return;
  }
  
  // Apply equipped background
  const background = marketplaceBackgrounds.find(b => b.id === currentUser.equippedBackground);
  if (background) {
    document.body.style.background = background.gradient;
    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundAttachment = 'fixed';
  }
}

function showDashboard(){
  loginContainer.style.display="none";
  dashboard.style.display="flex";
  document.getElementById("welcomeMsg").innerText=`Welcome, ${currentUser.username}`;
  document.getElementById("settingsBtn").style.display = currentUser.role==="admin"?"inline-block":"none";
  
  // Apply user's equipped background to dashboard
  applyDashboardBackground();
  
  // Initialize socket connection if not already connected
  if (!socket) {
    initializeSocket();
  } else if (currentUser) {
    // Re-authenticate if socket exists but user changed
    socket.emit('authenticate', currentUser.username);
  }
  
  initializeDailyTracking(); // Initialize daily tracking
  initializeAuraHistory(); // Initialize aura history
  renderCards();
  
  // Trigger fade-in effect
  setTimeout(() => {
    dashboard.style.opacity = 1;
  }, 50);
}

const cardsContainer = document.getElementById("cardsContainer");
function renderCards(){
  cardsContainer.innerHTML="";
  users.forEach(user=>{
    const card = document.createElement("div");
    card.className="userCard";
    
    // Get equipped name tag if any
    let nameTagDisplay = '';
    if (user.equippedNameTag) {
      const allAchievements = [...gainingAchievements, ...givingAchievements];
      const equippedAchievement = allAchievements.find(a => a.id === user.equippedNameTag);
      if (equippedAchievement) {
        nameTagDisplay = `<div class="user-name-tag">${equippedAchievement.name}</div>`;
      }
    }
    
    // Get equipped name color if any
    let nameColorStyle = '';
    if (user.equippedNameColor) {
      const nameColor = marketplaceNameColors.find(c => c.id === user.equippedNameColor);
      if (nameColor) {
        nameColorStyle = `color: ${nameColor.color};`;
      }
    }
    
    card.innerHTML = `
      <div class="user-name" style="${nameColorStyle}">${user.username}</div>
      <div class="user-aura"><span class="aura-label">Aura: </span><span class="aura-count">${user.aura}</span></div>
      ${nameTagDisplay}
    `;
    
    card.addEventListener("click", ()=>{
      selectedUser = user;
      openSlidePanel();
    });
    cardsContainer.appendChild(card);
  });
}

/* ======= SLIDE PANEL LOGIC ======= */

  const netStatus = netAmount > 0 ? `+${netAmount}` : netAmount.toString();

  panelUserName.innerHTML = `

/* ======= ACTIONS ======= */
async function giveAura(amount=25){
  try {
    const res = await fetch('/api/give-aura', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        giverUsername: currentUser.username, 
        receiverUsername: selectedUser.username, 
        amount 
      })
    });
    
    const data = await res.json();
    
    if (data.success) {
      // Reload data and update UI
      await loadFromServer();
      
      // Find updated user data after server reload
      const giver = users.find(u => u.username === currentUser.username);
      const receiver = users.find(u => u.username === selectedUser.username);
      
      // Add aura history entries for both users
      if (giver) addAuraHistoryEntry(giver.username, giver.aura);
      if (receiver) addAuraHistoryEntry(receiver.username, receiver.aura);
      
      // Update selectedUser reference with fresh data
      selectedUser = receiver;
      
      openSlidePanel();
      renderCards();
      updateChart();
    } else {
      showNotification(data.error || 'Failed to give aura', 'error');
    }
  } catch (error) {
    console.error('Error giving aura:', error);
    showNotification('❌ Failed to give aura', 'error');
  }
}

async function removeAura(amount=25){
  try {
    const res = await fetch('/api/remove-aura', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        removerUsername: currentUser.username, 
        targetUsername: selectedUser.username, 
        amount 
      })
    });
    
    const data = await res.json();
    
    if (data.success) {
      // Reload data and update UI
      await loadFromServer();
      
      // Find updated user data after server reload
      const remover = users.find(u => u.username === currentUser.username);
      const target = users.find(u => u.username === selectedUser.username);
      
      // Add aura history entries for both users
      if (remover) addAuraHistoryEntry(remover.username, remover.aura);
      if (target) addAuraHistoryEntry(target.username, target.aura);
      
      // Update selectedUser reference with fresh data
      selectedUser = target;
      
      openSlidePanel();
      renderCards();
      updateChart();
    } else {
      showNotification(data.error || 'Failed to remove aura', 'error');
    }
  } catch (error) {
    console.error('Error removing aura:', error);
    showNotification('❌ Failed to remove aura', 'error');
  }
}

// Export functionality
async function exportData() {
  try {
    const exportStatus = document.getElementById('exportStatus');
    exportStatus.textContent = '🔄 Preparing export...';
    
    // Get current announcement
    const announcement = await loadAnnouncement();
    
    // Create export data structure
    const exportData = {
      exportInfo: {
        timestamp: new Date().toISOString(),
        serverVersion: '1.0',
        totalUsers: users.length
      },
      users: users.map(user => ({
        username: user.username,
        password: user.password,
        aura: user.aura || 0,
        gems: user.gems || 0,
        role: user.role || 'user',
        achievements: user.achievements || [],
        totalGiven: user.totalGiven || 0,
        totalReceived: user.totalReceived || 0,
        purchasedBackgrounds: user.purchasedBackgrounds || [],
        purchasedNameColors: user.purchasedNameColors || [],
        purchasedNameTags: user.purchasedNameTags || [],
        equippedBackground: user.equippedBackground || null,
        equippedNameColor: user.equippedNameColor || null,
        equippedNameTag: user.equippedNameTag || null,
        netDailyAura: user.netDailyAura || {}
      })),
      settings: {
        announcement: announcement,
        lastReset: localStorage.getItem('lastAuraReset') || ''
      }
    };
    
    // Create and download file
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `aura-tracker-export-${new Date().toISOString().split('T')[0]}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    exportStatus.textContent = `✅ Export complete! ${users.length} users exported.`;
    showNotification(`📤 Successfully exported ${users.length} users`, 'success');
    
  } catch (error) {
    console.error('Export error:', error);
    const exportStatus = document.getElementById('exportStatus');
    exportStatus.textContent = '❌ Export failed!';
    showNotification('❌ Failed to export data', 'error');
  }
}

// Import functionality
let pendingImportData = null;

async function importData() {
  const importFile = document.getElementById('importFile');
  const importStatus = document.getElementById('importStatus');
  
  // Trigger file picker if no file selected
  if (!importFile.files.length) {
    importFile.click();
    return;
  }
  
  try {
    importStatus.textContent = '🔄 Reading file...';
    
    const file = importFile.files[0];
    const text = await file.text();
    const data = JSON.parse(text);
    
    // Validate data structure
    if (!data.users || !Array.isArray(data.users)) {
      throw new Error('Invalid file format');
    }
    
    pendingImportData = data;
    
    // Show preview
    const previewContent = document.getElementById('previewContent');
    const importPreview = document.getElementById('importPreview');
    
    previewContent.innerHTML = `
      <p><strong>Export Date:</strong> ${new Date(data.exportInfo?.timestamp || 'Unknown').toLocaleString()}</p>
      <p><strong>Version:</strong> ${data.exportInfo?.serverVersion || 'Unknown'}</p>
      <p><strong>Users to Import:</strong> ${data.users.length}</p>
      <p><strong>Users will be overwritten:</strong> ${users.length}</p>
      <div style="margin-top: 10px; padding: 10px; background: rgba(255,0,0,0.1); border-radius: 5px;">
        <p style="color: #ff6b6b;">⚠️ This will completely replace all current data!</p>
      </div>
    `;
    
    importPreview.style.display = 'block';
    importStatus.textContent = '✅ File ready for import';
    
  } catch (error) {
    console.error('Import error:', error);
    importStatus.textContent = `❌ Error: ${error.message}`;
    showNotification('❌ Failed to read import file', 'error');
  }
}

async function confirmImport() {
  if (!pendingImportData) return;
  
  try {
    if (!confirm('⚠️ FINAL WARNING: This will overwrite all existing data and cannot be undone. Continue?')) {
      return;
    }
    
    const importStatus = document.getElementById('importStatus');
    importStatus.textContent = '🔄 Importing data...';
    
    // Apply imported data
    users.length = 0;
    users.push(...pendingImportData.users);
    
    // Update announcement if present
    if (pendingImportData.settings?.announcement) {
      await updateAnnouncement(pendingImportData.settings.announcement);
    }
    
    // Update last reset if present
    if (pendingImportData.settings?.lastReset) {
      localStorage.setItem('lastAuraReset', pendingImportData.settings.lastReset);
    }
    
    // Save to server
    await saveToServer();
    
    // Update UI
    await loadFromServer();
    renderCards();
    renderUsersList();
    
    // Close modal
    closeUpdates();
    
    // Show success
    showNotification(`📥 Successfully imported ${pendingImportData.users.length} users!`, 'success');
    
    // Clear pending data
    pendingImportData = null;
    
  } catch (error) {
    console.error('Import confirmation error:', error);
    const importStatus = document.getElementById('importStatus');
    importStatus.textContent = '❌ Import failed!';
    showNotification('❌ Failed to import data', 'error');
  }
}

function cancelImport() {
  pendingImportData = null;
  document.getElementById('importPreview').style.display = 'none';
  document.getElementById('importStatus').textContent = '';
  document.getElementById('importFile').value = '';
}

// Notification system
function showNotification(message, type = 'info') {
  const notificationContainer = document.getElementById('notificationContainer');
  
  // Create notification element
  const notification = document.createElement('div');
  notification.className = `notification ${type}`;
  notification.innerHTML = `
    <div class="notification-content">
      <span class="notification-icon">${type === 'warning' ? '⚠️' : type === 'error' ? '❌' : '✅'}</span>
      <span class="notification-message">${message}</span>
    </div>
  `;
  
  // Add to container
  notificationContainer.appendChild(notification);
  
  // Show notification
  notification.classList.add('show');
  
  // Auto-hide after 5 seconds
  setTimeout(() => {
    notification.classList.remove('show');
    setTimeout(() => {
      if (notificationContainer.contains(notification)) {
        notificationContainer.removeChild(notification);
      }
    }, 300); // Wait for slide-out animation
  }, 5000);
}

async function deleteUser(username) {
  if (confirm(`Are you sure you want to delete ${username}?`)) {
    const index = users.findIndex(u => u.username === username);
    if (index > -1) {
      users.splice(index, 1);
      renderUsersList();
      renderCards();
      await saveToServer();
    }
  }
}

async function addGems(username, amount) {
  const user = users.find(u => u.username === username);
  if (!user) return;
  
  // Ensure gems field exists
  if (!user.gems) user.gems = 0;
  
  // Add/subtract gems (prevent negative values)
  const newGemCount = Math.max(0, user.gems + amount);
  const actualChange = newGemCount - user.gems;
  user.gems = newGemCount;
  
  // Save and update UI
  await saveToServer();
  renderUsersList();
  renderCards();
  
  // Show notification
  if (actualChange > 0) {
    showNotification(`💎 Added ${actualChange} gems to ${username}`, 'success');
  } else if (actualChange < 0) {
    showNotification(`💎 Removed ${Math.abs(actualChange)} gems from ${username}`, 'warning');
  }
}

function renderMarketplace() {
  const marketplaceBackgroundsGrid = document.getElementById('marketplaceBackgroundsGrid');
  const marketplaceNameColorsGrid = document.getElementById('marketplaceNameColorsGrid');
  marketplaceBackgroundsGrid.innerHTML = '';
  marketplaceNameColorsGrid.innerHTML = '';
  
  // Get current user data
  const user = users.find(u => u.username === currentUser.username);
  const userGems = user.gems || 0;
  const purchasedBackgrounds = user.purchasedBackgrounds || [];
  const equippedBackground = user.equippedBackground || null;
  const purchasedNameColors = user.purchasedNameColors || [];
  const equippedNameColor = user.equippedNameColor || null;
  
  // Render backgrounds
  marketplaceBackgrounds.forEach(background => {
    const isPurchased = purchasedBackgrounds.includes(background.id);
    const isEquipped = equippedBackground === background.id;
    const canAfford = userGems >= background.price;
    
    const marketplaceItem = createMarketplaceBackgroundItem(background, isPurchased, isEquipped, canAfford);
    marketplaceBackgroundsGrid.appendChild(marketplaceItem);
  });
  
  // Render name colors
  marketplaceNameColors.forEach(nameColor => {
    const isPurchased = purchasedNameColors.includes(nameColor.id);
    const isEquipped = equippedNameColor === nameColor.id;
    const canAfford = userGems >= nameColor.price;
    
    const marketplaceItem = createMarketplaceNameColorItem(nameColor, isPurchased, isEquipped, canAfford);
    marketplaceNameColorsGrid.appendChild(marketplaceItem);
  });
}

function createMarketplaceBackgroundItem(background, isPurchased, isEquipped, canAfford) {
  const marketplaceItem = document.createElement('div');
  marketplaceItem.className = `marketplace-item ${isPurchased ? 'purchased' : ''}`;
  
  marketplaceItem.innerHTML = `
    ${isPurchased ? '<div class="status-badge">OWNED</div>' : ''}
    <div class="background-preview" style="background: ${background.gradient}"></div>
    <div class="item-name">${background.name}</div>
    <div class="item-price">${background.price} 💎</div>
    ${!isPurchased ? 
      `<button class="buy-btn" onclick="buyBackground('${background.id}', ${background.price})" ${!canAfford ? 'disabled' : ''}>
        ${canAfford ? 'Buy Now' : 'Insufficient Gems'}
      </button>` :
      '<div class="owned-status">OWNED</div>'
    }
  `;
  
  return marketplaceItem;
}

function createMarketplaceNameColorItem(nameColor, isPurchased, isEquipped, canAfford) {
  const marketplaceItem = document.createElement('div');
  marketplaceItem.className = `marketplace-item ${isPurchased ? 'purchased' : ''}`;
  
  marketplaceItem.innerHTML = `
    ${isPurchased ? '<div class="status-badge">OWNED</div>' : ''}
    <div class="color-preview" style="background: ${nameColor.color}; color: ${nameColor.color};">Sample</div>
    <div class="item-name">${nameColor.name}</div>
    <div class="item-price">${nameColor.price} 💎</div>
    ${!isPurchased ? 
      `<button class="buy-btn" onclick="buyNameColor('${nameColor.id}', ${nameColor.price})" ${!canAfford ? 'disabled' : ''}>
        ${canAfford ? 'Buy Now' : 'Insufficient Gems'}
      </button>` :
      '<div class="owned-status">OWNED</div>'
    }
  `;
  
  return marketplaceItem;
}

async function buyNameColor(nameColorId, price) {
  const user = users.find(u => u.username === currentUser.username);
  
  if (user.gems < price) {
    showNotification('❌ Insufficient gems!', 'error');
    return;
  }
  
  if (!user.purchasedNameColors) {
    user.purchasedNameColors = [];
  }
  
  if (user.purchasedNameColors.includes(nameColorId)) {
    showNotification('❌ Already purchased!', 'error');
    return;
  }
  
  // Deduct gems and add to purchased name colors
  user.gems -= price;
  user.purchasedNameColors.push(nameColorId);
  
  // Save to server
  await saveToServer();
  
  // Update UI
  renderMarketplace();
  renderCards();
  
  // Update gem count in marketplace header
  const gemCountElement = document.getElementById('userGemCount');
  if (gemCountElement) {
    gemCountElement.textContent = user.gems || 0;
  }
  
  showNotification(`✅ Purchased name color for ${price} gems!`, 'success');
}

async function equipNameColor(nameColorId) {
  const user = users.find(u => u.username === currentUser.username);
  
  if (!user.purchasedNameColors || !user.purchasedNameColors.includes(nameColorId)) {
    showNotification('❌ Name color not purchased!', 'error');
    return;
  }
  
  // Determine action and itemId
  const action = user.equippedNameColor === nameColorId ? 'unequip' : 'equip';
  const itemId = action === 'unequip' ? null : nameColorId;
  
  try {
    // Call the customization API with WebSocket broadcasting
    const requestBody = {
      username: currentUser.username,
      customizationType: 'nameColor',
      itemId: itemId,
      action: action
    };
    console.log('Sending request:', requestBody);
    
    const res = await fetch('/api/customization', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody)
    });
    
    console.log('Response status:', res.status);
    const data = await res.json();
    console.log('Response data:', data);
    
    if (data.success) {
      // Update local data immediately (WebSocket will also update other users)
      user.equippedNameColor = itemId;
      
      // Update UI
      renderMarketplace();
      renderCards();
      
      // Refresh customization modal if open
      if (cardCustomizationModal.style.display === 'block') {
        renderNameColors();
      }
      
      // Show local notification (WebSocket will show live notification to others)
      if (action === 'equip') {
        const nameColor = marketplaceNameColors.find(c => c.id === nameColorId);
        showNotification(`🎨 Equipped: ${nameColor.name}`, 'success');
      } else {
        showNotification('🎨 Name color unequipped', 'success');
      }
    } else {
      showNotification(data.error || 'Failed to update name color', 'error');
    }
  } catch (error) {
    console.error('Error updating name color:', error);
    showNotification('❌ Failed to update name color', 'error');
  }
}

async function equipBackground(backgroundId) {
  const user = users.find(u => u.username === currentUser.username);
  
  if (!user.purchasedBackgrounds || !user.purchasedBackgrounds.includes(backgroundId)) {
    showNotification('❌ Background not purchased!', 'error');
    return;
  }
  
  // Unequip if already equipped, otherwise equip new
  if (user.equippedBackground === backgroundId) {
    user.equippedBackground = null;
    showNotification('🎨 Background unequipped', 'success');
  } else {
    user.equippedBackground = backgroundId;
    const background = marketplaceBackgrounds.find(b => b.id === backgroundId);
    showNotification(`🎨 Equipped: ${background.name}`, 'success');
  }
  
  // Save to server and update UI
  await saveToServer();
  renderMarketplace();
  renderCards();
  
  // Apply dashboard background if current user equipped background
  if (currentUser.username === user.username) {
    applyDashboardBackground();
  }
  
  // Refresh card customization if open
  if (cardCustomizationModal.style.display === 'block') {
    renderBackgrounds();
  }
}

function renderNameTags() {
  const nameTagGrid = document.getElementById('nameTagGrid');
  nameTagGrid.innerHTML = '';
  
  // Get current user data
  const user = users.find(u => u.username === currentUser.username);
  const userAchievements = user.achievements || [];
  const totalGiven = user.totalGiven || 0;
  const currentAura = user.aura || 0;
  const equippedNameTag = user.equippedNameTag || null;
  
  // Filter gaining achievements (based on current aura)
  const unlockedGainingAchievements = gainingAchievements.filter(achievement => 
    currentAura >= achievement.requirement
  );
  
  // Filter giving achievements (based on total given)
  const unlockedGivingAchievements = givingAchievements.filter(achievement => 
    totalGiven >= achievement.requirement
  );
  
  // Combine all unlocked achievements
  const unlockedAchievements = [...unlockedGainingAchievements, ...unlockedGivingAchievements];
  
  // Create name tag cards for unlocked achievements
  unlockedAchievements.forEach(achievement => {
    const isEquipped = equippedNameTag === achievement.id;
    const nameTagCard = createNameTagCard(achievement, isEquipped);
    nameTagGrid.appendChild(nameTagCard);
  });
  
  // If no unlocked achievements, show message
  if (unlockedAchievements.length === 0) {
    nameTagGrid.innerHTML = '<div style="text-align: center; color: #999; padding: 40px;">No unlocked achievements yet. Unlock achievements to equip name tags!</div>';
  }
}

async function equipNameTag(achievementId) {
  const user = users.find(u => u.username === currentUser.username);
  
  // Determine action and itemId
  const action = user.equippedNameTag === achievementId ? 'unequip' : 'equip';
  const itemId = action === 'unequip' ? null : achievementId;
  
  try {
    // Call the customization API with WebSocket broadcasting
    const res = await fetch('/api/customization', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: currentUser.username,
        customizationType: 'nameTag',
        itemId: itemId,
        action: action
      })
    });
    
    const data = await res.json();
    
    if (data.success) {
      // Update local data immediately (WebSocket will also update other users)
      user.equippedNameTag = itemId;
      
      // Update UI
      renderNameTags();
      renderCards(); // Re-render cards to show updated name tag
      
      // Show local notification (WebSocket will show live notification to others)
      if (action === 'equip') {
        const achievement = gainingAchievements.find(a => a.id === achievementId) || givingAchievements.find(a => a.id === achievementId);
        showNotification(`🏷️ Equipped: ${achievement.name}`, 'success');
      } else {
        showNotification('🏷️ Name tag unequipped', 'success');
      }
    } else {
      showNotification(data.error || 'Failed to update name tag', 'error');
    }
  } catch (error) {
    console.error('Error updating name tag:', error);
    showNotification('❌ Failed to update name tag', 'error');
  }
}

/* ======= CHART.JS GRAPH ======= */
function updateChart(){
  try {
    const canvas = document.getElementById('auraChart');
    if (!canvas) {
      console.error('Chart canvas not found');
      return;
    }
    
    const ctx = canvas.getContext('2d');
    if (!ctx) {
      console.error('Could not get canvas context');
      return;
    }
    
    // Handle case where selectedUser might be undefined
    if (!selectedUser) {
      console.error('No user selected for chart');
      return;
    }
    
    console.log('Updating chart for user:', selectedUser.username, 'Current aura:', selectedUser.aura);
    
    // Get real aura history for selected user
    const userHistory = auraHistory[selectedUser.username] || [];
    
    // If no history, create initial entry
    if (userHistory.length === 0) {
      addAuraHistoryEntry(selectedUser.username, selectedUser.aura);
    }
    
    const history = auraHistory[selectedUser.username];
    const labels = history.map(entry => entry.time);
    const data = history.map(entry => entry.aura);
    
    if(chart) {
      chart.destroy();
      chart = null;
    }
    
    chart = new Chart(ctx, {
      type: 'line',
      data: { 
        labels: labels, 
        datasets:[{ 
          label: 'Aura Over Time', 
          data: data, 
          borderColor:'#00f6ff', 
          backgroundColor:'rgba(0,246,255,0.2)', 
          tension:0.4,
          fill: true,
          pointBackgroundColor: '#00f6ff',
          pointBorderColor: '#fff',
          pointBorderWidth: 2,
          pointRadius: 5
        }] 
      },
      options:{ 
        responsive:true, 
        maintainAspectRatio: false,
        plugins:{ 
          legend:{ display:false } 
        }, 
        scales:{ 
          y:{ 
            beginAtZero:true,
            grid: {
              color: 'rgba(255,255,255,0.1)'
            },
            ticks: {
              color: 'rgba(255,255,255,0.8)'
            }
          },
          x: {
            grid: {
              color: 'rgba(255,255,255,0.1)'
            },
            ticks: {
              color: 'rgba(255,255,255,0.8)',
              maxRotation: 45,
              minRotation: 45
            }
          }
        } 
      }
    });
    
    console.log('Chart created successfully with', data.length, 'data points');
  } catch (error) {
    console.error('Error creating chart:', error);
  }
}

// Add touch-friendly swipe gestures for mobile
let touchStartX = 0;
let touchStartY = 0;
let touchEndX = 0;
let touchEndY = 0;

document.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  touchEndX = e.changedTouches[0].screenX;
  touchEndY = e.changedTouches[0].screenY;
  handleSwipe();
}, { passive: true });

function handleSwipe() {
  const swipeThreshold = 50;
  const xDiff = touchStartX - touchEndX;
  const yDiff = touchStartY - touchEndY;
  
  // Check if it's a horizontal swipe
  if (Math.abs(xDiff) > Math.abs(yDiff)) {
    if (Math.abs(xDiff) > swipeThreshold) {
      if (xDiff > 0) {
        // Swipe left - could be used for navigation
        console.log('Swiped left');
      } else {
        // Swipe right - could be used for navigation
        console.log('Swiped right');
      }
    }
  }
  
  // Check if it's a vertical swipe
  if (Math.abs(yDiff) > swipeThreshold) {
    if (yDiff > 0) {
      // Swipe up - could open panels
      console.log('Swiped up');
    } else {
      // Swipe down - could close panels
      if (slidePanel.classList.contains('open')) {
        slidePanel.classList.remove('open');
      }
    }
  }
}
